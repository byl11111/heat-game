<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>职业性中暑真实案例库 - 档案室</title>
    <style>
        :root {
            --red-main: #D73521;
            --orange-main: #F47A31;
            --ash-main: #8F9397;
            --bg: #F7F5F2;
            --stroke: #2A2725;
            --soft-line: rgba(42, 39, 37, 0.16);
            --glass: rgba(255, 255, 255, 0.74);
            --shadow: rgba(96, 72, 61, 0.18);
            --geo-white: #F8F8F6;
            --geo-paper: #EFEFED;
            --geo-ash: #D7DADB;
            --geo-dark-ash: #707579;
            --geo-red: #D73521;
            --geo-orange: #F47A31;
            --geo-grain: radial-gradient(rgba(42, 39, 37, 0.13) 0.65px, transparent 0.85px);
            --geo-panel:
                radial-gradient(circle at 22% 26%, rgba(255, 255, 255, 0.62) 0 18%, transparent 18.5%),
                radial-gradient(circle at 76% 68%, rgba(215, 53, 33, 0.16) 0 22%, transparent 22.5%),
                linear-gradient(132deg, var(--geo-white) 0 38%, #E8E9E8 38% 58%, #FFFFFF 58% 76%, #DCDDDE 76% 100%);
            --geo-warm:
                radial-gradient(circle at 76% 18%, rgba(244, 122, 49, 0.34) 0 21%, transparent 21.5%),
                radial-gradient(circle at 18% 76%, rgba(215, 53, 33, 0.2) 0 24%, transparent 24.5%),
                linear-gradient(135deg, #FFFFFF 0 42%, #F1F1EF 42% 68%, #DADDDD 68% 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background:
                radial-gradient(circle at 20% 28%, rgba(215, 53, 33, 0.12) 0 18%, transparent 18.4%),
                radial-gradient(circle at 82% 18%, rgba(244, 122, 49, 0.16) 0 20%, transparent 20.4%),
                linear-gradient(135deg, #FFFFFF 0 34%, #E9EBEB 34% 58%, #FFFFFF 58% 76%, #D9DDDE 76% 100%);
            color: var(--stroke);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            isolation: isolate;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background-image: var(--geo-grain);
            background-size: 3px 3px;
            opacity: 0.42;
            mix-blend-mode: multiply;
        }

        header {
            height: 50px;
            background:
                radial-gradient(circle at 14% 32%, rgba(215, 53, 33, 0.16) 0 18%, transparent 18.5%),
                linear-gradient(112deg, #FFFFFF 0 50%, #ECEEEE 50% 72%, rgba(244, 122, 49, 0.2) 72% 100%);
            border-bottom: 1px solid var(--soft-line);
            box-shadow: 0 10px 0 rgba(143, 147, 151, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 100;
        }

        .archive-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: #666;
        }

        .return-level-btn {
            border: 1px solid rgba(42, 39, 37, 0.2);
            background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(236,238,238,0.72));
            color: var(--stroke);
            height: 32px;
            padding: 0 14px;
            border-radius: 4px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 4px 5px 0 rgba(143, 147, 151, 0.12);
        }

        .return-level-btn:hover {
            transform: translateY(-1px);
            border-color: rgba(215, 53, 33, 0.38);
            color: var(--red-main);
        }

        /* ABCD 分类导航 */
        nav {
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            background:
                radial-gradient(circle at 68% 28%, rgba(244, 122, 49, 0.18) 0 18%, transparent 18.5%),
                linear-gradient(105deg, #F8F8F6 0 42%, #E6E8E8 42% 62%, #FFFFFF 62% 100%);
            border-bottom: 1px solid rgba(143, 147, 151, 0.24);
            position: relative;
            z-index: 10;
        }

        .tab-btn {
            display: flex;
            align-items: center;
            border: 1px solid rgba(42, 39, 37, 0.2);
            background: var(--geo-panel);
            background-size: auto, auto, auto;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
            height: 38px;
            overflow: hidden;
            box-shadow: 6px 7px 0 rgba(143, 147, 151, 0.12);
        }

            .tab-btn .letter {
                width: 32px;
                height: 32px;
                background:
                    radial-gradient(circle at 70% 26%, rgba(244, 122, 49, 0.52), transparent 30%),
                    linear-gradient(135deg, var(--geo-red) 0 58%, var(--geo-orange) 58% 100%);
                color: white;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                font-weight: 900;
            }

            .tab-btn .label {
                padding: 0 15px;
                font-weight: bold;
                font-size: 13px;
            }

            .tab-btn.active {
                background:
                    radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.34) 0 18%, transparent 18.5%),
                    linear-gradient(135deg, var(--red-main) 0 58%, var(--orange-main) 58% 100%);
                color: white;
                transform: translateY(-2px);
                box-shadow: 6px 8px 0 rgba(215, 53, 33, 0.16);
                border-color: rgba(255, 255, 255, 0.62);
            }

        /* 主布局区 */
        .layout {
            flex: 1;
            display: grid;
            grid-template-columns: 340px 1fr 240px;
            padding: 15px;
            gap: 15px;
            min-height: 0;
            position: relative;
            z-index: 1;
        }

        /* 左侧图表栏 */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 0;
        }

        .chart-card {
            background:
                var(--geo-grain),
                radial-gradient(circle at 14% 18%, rgba(215, 53, 33, 0.13) 0 20%, transparent 20.4%),
                radial-gradient(circle at 86% 78%, rgba(143, 147, 151, 0.16) 0 24%, transparent 24.4%),
                linear-gradient(135deg, #FFFFFF 0 54%, #ECEEEE 54% 76%, #FFFFFF 76% 100%);
            background-size: 3px 3px, auto, auto, auto;
            border: 1px solid rgba(42, 39, 37, 0.16);
            border-radius: 4px;
            padding: 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            box-shadow: 8px 9px 0 rgba(143, 147, 151, 0.12);
        }

            .chart-card h3 {
                font-size: 12px;
                margin-bottom: 5px;
                border-bottom: 1px solid rgba(215, 53, 33, 0.22);
                padding-bottom: 3px;
                color: #6B5D57;
            }

        .chart-container {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        /* 中间档案桌面 */
        .archive-desk {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(12px 14px 0 rgba(143, 147, 151, 0.12));
        }

        .folder-stack {
            position: relative;
            width: 90%;
            height: 95%;
            transform-style: preserve-3d;
        }

        /* --- 拟真文件夹样式 --- */
        .folder {
            position: absolute;
            width: 100%;
            height: 100%;
            background:
                var(--geo-grain),
                radial-gradient(circle at 16% 22%, rgba(215, 53, 33, 0.16) 0 18%, transparent 18.5%),
                radial-gradient(circle at 84% 16%, rgba(244, 122, 49, 0.18) 0 20%, transparent 20.5%),
                linear-gradient(132deg, #FFFFFF 0 46%, #ECEEEE 46% 64%, #FFFFFF 64% 82%, #DDE1E2 82% 100%);
            background-size: 3px 3px, auto, auto, auto;
            border: 1px solid rgba(42, 39, 37, 0.18);
            border-radius: 4px;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            display: grid;
            grid-template-columns: 45% 55%; /* 插图左，文字右 */
            box-shadow: 12px 14px 0 rgba(143, 147, 151, 0.14);
            overflow: visible;
        }
        /* 文件夹顶部的突出标签 */
        .folder-tab {
            position: absolute;
            top: -30px;
            left: 40px;
            width: 120px;
            height: 30px;
            background: linear-gradient(115deg, rgba(255,255,255,0.94), rgba(244,122,49,0.16));
            border: 1px solid rgba(42, 39, 37, 0.2);
            border-bottom: none;
            border-radius: 4px 4px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #6B3B31;
            box-shadow: 0 -8px 22px rgba(215, 53, 33, 0.08);
        }

        .archive-case-count {
            position: absolute;
            top: 10px;
            right: 12px;
            z-index: 140;
            padding: 5px 10px;
            border: 1px solid rgba(212, 83, 49, 0.26);
            border-radius: 999px;
            color: #9C3B25;
            background: rgba(255, 246, 240, 0.9);
            font: 700 10px Consolas, "Courier New", monospace;
        }

        .folder.active {
            z-index: 100;
            transform: translate(0,0);
            opacity: 1;
        }

        .folder.behind {
            z-index: 50;
            transform: translate(15px, 15px);
            opacity: 0.16;
            filter: none;
        }

        .folder.exit {
            transform: translate(-100%, -50px) rotate(-10deg);
            opacity: 0;
        }

        /* 左侧插图 */
        .case-illu {
            border-right: 1px solid rgba(42, 39, 37, 0.14);
            background:
                var(--geo-grain),
                radial-gradient(circle at 38% 34%, rgba(215, 53, 33, 0.13) 0 18%, transparent 18.5%),
                linear-gradient(145deg, #FFFFFF 0 54%, #ECEEEE 54% 100%);
            background-size: 3px 3px, auto, auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .illu-inner {
            width: 100%;
            aspect-ratio: 1/1;
            border: 1px dashed rgba(42, 39, 37, 0.22);
            border-radius: 4px;
            background:
                var(--geo-grain),
                radial-gradient(circle at 78% 18%, rgba(215,53,33,0.16) 0 20%, transparent 20.5%),
                linear-gradient(150deg, #FFFFFF 0 48%, #DDE1E2 48% 68%, #FFFFFF 68% 100%);
            background-size: 3px 3px, auto, auto;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 14px;
            color: #7E7D7C;
            padding: 20px;
        }

        /* 右侧文字内容 */
        .case-details {
            padding: 40px 30px;
            position: relative;
            overflow-y: auto;
        }

        .case-header {
            border-bottom: 1px solid rgba(215, 53, 33, 0.26);
            margin-bottom: 20px;
            padding-bottom: 5px;
        }

        .case-job {
            font-size: 2.4rem;
            font-weight: 900;
            color: #2F2926;
        }

        .case-id {
            font-family: monospace;
            font-size: 11px;
            color: #8A7770;
        }

        .info-table {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .info-cell {
            border-bottom: 1px solid rgba(143, 147, 151, 0.24);
            padding-bottom: 5px;
        }

            .info-cell b {
                color: var(--red-main);
                font-size: 11px;
                display: block;
                text-transform: uppercase;
            }

        .case-summary {
            font-size: 14px;
            line-height: 1.6;
            color: #3E3835;
        }

        .red-stamp {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 110px;
            height: 110px;
            border: 4px double var(--red-main);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--red-main);
            font-size: 22px;
            font-weight: 900;
            transform: rotate(-15deg);
            opacity: 0.8;
            background: rgba(255, 255, 255, 0.42);
            box-shadow: 0 8px 22px rgba(215, 53, 33, 0.12);
        }

        /* 翻页按钮 */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 80px;
            background:
                var(--geo-grain),
                radial-gradient(circle at 30% 20%, rgba(244, 122, 49, 0.18) 0 22%, transparent 22.5%),
                linear-gradient(145deg, #FFFFFF 0 52%, #E5E8E8 52% 100%);
            background-size: 3px 3px, auto, auto;
            border: 1px solid rgba(42, 39, 37, 0.18);
            border-radius: 4px;
            font-size: 24px;
            cursor: pointer;
            z-index: 200;
            color: var(--red-main);
            box-shadow: 7px 8px 0 rgba(143, 147, 151, 0.14);
        }

        .btn-prev {
            left: -22px;
            border-radius: 8px 0 0 8px;
        }

        .btn-next {
            right: -22px;
            border-radius: 0 8px 8px 0;
        }

        /* 右侧老李形象 */
        .char-zone {
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .li-full {
            height: 95%;
            width: auto;
            object-fit: contain;
        }

        /* 底部对话框 - 带向上尖尖 */
        .footer-dialog {
            height: 16vh;
            padding: 0 40px 20px 40px;
            flex-shrink: 0;
        }

        .speech-bubble {
            height: 100%;
            background:
                var(--geo-grain),
                radial-gradient(circle at 13% 24%, rgba(215, 53, 33, 0.16) 0 22%, transparent 22.5%),
                radial-gradient(circle at 82% 78%, rgba(143, 147, 151, 0.18) 0 26%, transparent 26.5%),
                linear-gradient(105deg, #FFFFFF 0 56%, #ECEEEE 56% 74%, #FFFFFF 74% 100%);
            background-size: 3px 3px, auto, auto, auto;
            border: 1px solid rgba(42, 39, 37, 0.18);
            border-radius: 4px;
            box-shadow: 10px 11px 0 rgba(143, 147, 151, 0.14), inset 0 0 0 1px rgba(255,255,255,0.42);
            display: flex;
            align-items: center;
            padding: 0 40px;
            position: relative;
            isolation: isolate;
        }
            /* 向上的尖尖，指向右侧的老李 */
            .speech-bubble::after {
                content: "";
                position: absolute;
                right: 140px;
                top: -23px;
                width: 52px;
                height: 52px;
                background:
                    linear-gradient(135deg, #FFFFFF 0 54%, #ECEEEE 54% 100%);
                border-left: 1px solid rgba(42, 39, 37, 0.18);
                border-top: 1px solid rgba(42, 39, 37, 0.18);
                border-radius: 4px;
                transform: rotate(45deg);
                z-index: 0;
            }

            .speech-bubble::before {
                display: none;
            }

        .li-badge {
            background: linear-gradient(115deg, var(--red-main), var(--orange-main));
            color: white;
            padding: 5px 18px;
            font-weight: 900;
            transform: skewX(-10deg);
            margin-right: 25px;
            flex-shrink: 0;
            border-radius: 4px;
            box-shadow: 0 8px 20px rgba(215, 53, 33, 0.24);
            position: relative;
            z-index: 1;
        }

        .speech-content {
            font-size: 16px;
            font-weight: 500;
            line-height: 1.5;
            color: #322C29;
            flex: 1;
            position: relative;
            z-index: 1;
        }

        /* 维修工手册组件 */
        .manual-launcher {
            position: fixed;
            right: 22px;
            bottom: 22px;
            z-index: 420;
            width: 72px;
            height: 72px;
            border: 1px solid rgba(42, 39, 37, 0.16);
            border-radius: 4px;
            background:
                var(--geo-grain),
                radial-gradient(circle at 72% 22%, rgba(244, 122, 49, 0.36) 0 19%, transparent 19.5%),
                linear-gradient(135deg, #FFFFFF 0 36%, var(--geo-red) 36% 64%, #E7E9E9 64% 100%);
            background-size: 3px 3px, auto, auto;
            color: #2A2725;
            font-weight: 900;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 8px 9px 0 rgba(143, 147, 151, 0.18);
            display: grid;
            place-items: center;
            transition: transform 0.22s ease, box-shadow 0.22s ease;
            overflow: hidden;
        }

        .manual-launcher::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(42, 39, 37, 0.16) 0.8px, transparent 0.9px);
            background-size: 4px 4px;
            mix-blend-mode: multiply;
            opacity: 0.42;
            pointer-events: none;
        }

        .manual-launcher:hover {
            transform: translateY(-4px) scale(1.04);
            box-shadow: 8px 10px 0 rgba(215, 53, 33, 0.16);
        }

        .manual-launcher span {
            display: grid;
            gap: 2px;
            justify-items: center;
        }

        .manual-icon-mark {
            width: 28px;
            height: 24px;
            border: 2px solid #2A2725;
            border-radius: 2px;
            background:
                linear-gradient(90deg, transparent 48%, rgba(42, 39, 37, 0.38) 48% 52%, transparent 52%),
                linear-gradient(135deg, rgba(255,255,255,0.82) 0 42%, rgba(215,53,33,0.72) 42% 72%, rgba(244,122,49,0.64) 72% 100%);
            box-shadow: 3px 3px 0 rgba(42, 39, 37, 0.18);
        }

        .repair-manual {
            position: fixed;
            right: 22px;
            bottom: 112px;
            z-index: 410;
            width: min(500px, calc(100vw - 34px));
            height: min(600px, calc(100vh - 132px));
            transform: translate(42px, 42px) scale(0.88);
            transform-origin: right bottom;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.34s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.22s ease;
        }

        .repair-manual.open {
            transform: translate(0, 0) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .manual-book {
            position: relative;
            height: 100%;
            padding: 18px 34px 22px 26px;
            border-radius: 6px;
            background:
                var(--geo-grain),
                radial-gradient(circle at 24% 24%, rgba(255, 255, 255, 0.58) 0 18%, transparent 18.5%),
                radial-gradient(circle at 78% 22%, rgba(244, 122, 49, 0.32) 0 20%, transparent 20.5%),
                linear-gradient(135deg, #D73521 0 31%, #F47A31 31% 52%, #FFFFFF 52% 78%, #DDE1E2 78% 100%);
            background-size: 3px 3px, auto, auto, auto;
            box-shadow: 12px 14px 0 rgba(143, 147, 151, 0.16);
            overflow: visible;
            border: 1px solid rgba(42, 39, 37, 0.16);
            isolation: isolate;
        }

        .manual-book::after {
            display: none;
        }

        .manual-book::before {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            width: 58px;
            border-radius: 6px 0 0 6px;
            background:
                radial-gradient(circle at 44% 20%, rgba(255, 255, 255, 0.38) 0 20%, transparent 20.5%),
                linear-gradient(180deg, #C8291C 0 42%, #F47A31 42% 66%, #F3F3F4 66% 100%);
            box-shadow: inset -1px 0 0 rgba(42, 39, 37, 0.14);
            opacity: 0.96;
        }

        .manual-header {
            height: 72px;
            color: #2A2725;
            cursor: grab;
            user-select: none;
            position: relative;
            z-index: 1;
            padding-left: 50px;
        }

        .manual-header:active {
            cursor: grabbing;
        }

        .manual-title-row {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
        }

        .manual-title-row h2 {
            font-size: 24px;
            line-height: 1.1;
            letter-spacing: 0;
            margin: 0 0 8px;
            text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.78);
        }

        .manual-title-row p {
            color: rgba(42, 39, 37, 0.66);
            font-size: 12px;
            font-weight: 700;
        }

        .manual-close {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid rgba(42, 39, 37, 0.16);
            color: #2A2725;
            background: rgba(255, 255, 255, 0.82);
            cursor: pointer;
            font-size: 18px;
        }

        .manual-page {
            position: relative;
            height: calc(100% - 72px);
            border-radius: 5px;
            background:
                radial-gradient(circle at 28% 12%, rgba(215, 53, 33, 0.12) 0 18%, transparent 18.5%),
                radial-gradient(circle at 88% 18%, rgba(244, 122, 49, 0.12) 0 18%, transparent 18.5%),
                radial-gradient(circle at 18% 88%, rgba(42, 39, 37, 0.12) 0 22%, transparent 22.5%),
                linear-gradient(rgba(42, 39, 37, 0.055) 1px, transparent 1px),
                linear-gradient(90deg, rgba(42, 39, 37, 0.045) 1px, transparent 1px),
                linear-gradient(118deg, #FFFFFF 0 58%, #F1F2F2 58% 78%, #FFFFFF 78% 100%);
            background-size: auto, auto, auto, 22px 22px, 22px 22px, auto;
            box-shadow: inset 0 0 0 1px rgba(42, 39, 37, 0.14), 10px 12px 0 rgba(42, 39, 37, 0.08);
            overflow: hidden;
            margin-left: 50px;
            transform-style: preserve-3d;
            perspective: 900px;
        }

        .manual-page::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image: radial-gradient(rgba(42, 39, 37, 0.18) 0.7px, transparent 0.9px);
            background-size: 3px 3px;
            mix-blend-mode: multiply;
            opacity: 0.16;
        }

        .manual-content {
            height: 100%;
            overflow-y: auto;
            padding: 20px 22px 120px;
            color: #34281E;
            transform-origin: left center;
            backface-visibility: hidden;
        }

        .manual-page.page-turning .manual-content {
            animation: manualPageTurn 0.46s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes manualPageTurn {
            0% {
                transform: rotateY(0deg) translateX(0);
                opacity: 1;
            }
            45% {
                transform: rotateY(-72deg) translateX(-8px);
                opacity: 0.32;
            }
            100% {
                transform: rotateY(0deg) translateX(0);
                opacity: 1;
            }
        }

        .manual-content h3 {
            font-size: 22px;
            margin-bottom: 10px;
            color: #2A2725;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chapter-mark {
            width: 22px;
            height: 22px;
            flex: 0 0 auto;
            border: 2px solid #2A2725;
            border-radius: 2px;
            background:
                var(--geo-grain),

        const CASE_LAYOUT_KEY = 'caseArchiveLayoutDirectorV1';

        function readCaseFrameLayout() {
            try {
                return Object.assign({}, getBakedSetting('caseFrames', {}), JSON.parse(safeStorageGet(CASE_FRAME_KEY, '{}') || '{}') || {});
            } catch (err) {
                return Object.assign({}, getBakedSetting('caseFrames', {}));
            }
        }

        function writeCaseLayoutExport() {
            const out = document.getElementById('caseLayoutExport');
            if (!out) return;
            out.value = JSON.stringify({
                sliders: readCaseLayout(),
                frames: readCaseFrameLayout()
            });
        }

        function applyCaseFrameLayout(values = readCaseFrameLayout()) {
            caseFrameItems.forEach(item => {
                const root = document.documentElement;
                const base = `--case-frame-${item.id}`;
                root.style.setProperty(`${base}-x`, `${Number(values[`${item.id}X`] || 0)}px`);
                root.style.setProperty(`${base}-y`, `${Number(values[`${item.id}Y`] || 0)}px`);
                if (Number(values[`${item.id}W`]) > 0) root.style.setProperty(`${base}-w`, `${Number(values[`${item.id}W`])}px`);
                else root.style.removeProperty(`${base}-w`);
                if (Number(values[`${item.id}H`]) > 0) root.style.setProperty(`${base}-h`, `${Number(values[`${item.id}H`])}px`);
                else root.style.removeProperty(`${base}-h`);
            });
            Object.keys(charts || {}).forEach(key => {
                const chart = charts[key];
                if (chart && chart.resize) chart.resize();
            });
            writeCaseLayoutExport();
        }

        function saveCaseFrameLayout(values) {
            safeStorageSet(CASE_FRAME_KEY, JSON.stringify(values || readCaseFrameLayout()));
            applyCaseFrameLayout(values || readCaseFrameLayout());
        }

        function getCaseLayoutDefaults() {
            return caseLayoutItems.reduce((acc, item) => {
                acc[item.key] = item.value;
                return acc;
            }, {});

        function readCaseLayout() {
            try {
                return Object.assign(getCaseLayoutDefaults(), getBakedSetting('caseLayout', {}), JSON.parse(safeStorageGet(CASE_LAYOUT_KEY, '{}') || '{}') || {});
            } catch (err) {
                return Object.assign(getCaseLayoutDefaults(), getBakedSetting('caseLayout', {}));
            }
        }

        function applyCaseLayout(values) {
            caseLayoutItems.forEach(item => {
                const value = Number(values[item.key] != null ? values[item.key] : item.value);
                document.documentElement.style.setProperty(item.css, `${value}${item.unit}`);
            });
            writeCaseLayoutExport();
        }

        function toggleCaseLayoutPanel(force) {
            const panel = document.getElementById('caseLayoutPanel');
            if (!panel) return;
            panel.classList.toggle('open', force != null ? force : !panel.classList.contains('open'));
            document.body.classList.toggle('case-frame-edit', panel.classList.contains('open'));
        }

        function initCaseFrameEditor() {
            let values = readCaseFrameLayout();
            applyCaseFrameLayout(values);
            let drag = null;

            caseFrameItems.forEach(item => {
                const el = document.querySelector(item.selector);
                if (!el || el.dataset.frameReady) return;
                el.dataset.frameReady = '1';
                el.dataset.frameId = item.id;
                const handle = document.createElement('i');
                handle.className = 'case-frame-handle';
                handle.setAttribute('aria-hidden', 'true');
                el.appendChild(handle);

                const start = (e, mode) => {
                    if (!document.body.classList.contains('case-frame-edit')) return;
                    if (mode === 'move' && e.target.closest('button, .nav-arrow, .case-frame-handle')) return;
                    e.preventDefault();
                    e.stopPropagation();
                    const rect = el.getBoundingClientRect();
                    values = readCaseFrameLayout();
                    drag = {
                        mode,
                        item,
                        startX: e.clientX,
                        startY: e.clientY,
                        baseX: Number(values[`${item.id}X`] || 0),
                        baseY: Number(values[`${item.id}Y`] || 0),
                        baseW: Number(values[`${item.id}W`] || rect.width),
                        baseH: Number(values[`${item.id}H`] || rect.height)
                    };
                    try { el.setPointerCapture(e.pointerId); } catch (err) {}
                };

                el.addEventListener('pointerdown', e => start(e, 'move'));
                handle.addEventListener('pointerdown', e => start(e, 'resize'));
            });

            window.addEventListener('pointermove', e => {
                if (!drag) return;
                const dx = e.clientX - drag.startX;
                const dy = e.clientY - drag.startY;
                const id = drag.item.id;
                if (drag.mode === 'move') {
                    values[`${id}X`] = Math.round(drag.baseX + dx);
                    values[`${id}Y`] = Math.round(drag.baseY + dy);
                } else {
                    values[`${id}W`] = Math.max(drag.item.minW, Math.round(drag.baseW + dx));
                    values[`${id}H`] = Math.max(drag.item.minH, Math.round(drag.baseH + dy));
                }
                safeStorageSet(CASE_FRAME_KEY, JSON.stringify(values));
                applyCaseFrameLayout(values);
            });

            window.addEventListener('pointerup', () => {
                if (!drag) return;
                saveCaseFrameLayout(values);
                drag = null;
            });
        }

        function initCaseLayoutControls() {
            const grid = document.getElementById('caseLayoutGrid');
            const saveBtn = document.getElementById('caseLayoutSave');
            const resetBtn = document.getElementById('caseLayoutReset');
            if (!grid) return;
            let values = readCaseLayout();
            grid.innerHTML = caseLayoutItems.map(item => `
                <label>
                    <span>${item.label}</span>
                    <input type="range" min="${item.min}" max="${item.max}" step="${item.step || 1}" value="${values[item.key] != null ? values[item.key] : item.value}" data-layout-key="${item.key}">
                    <b data-layout-val="${item.key}">${values[item.key] != null ? values[item.key] : item.value}</b>
                </label>
            `).join('');
            applyCaseLayout(values);
            grid.addEventListener('input', e => {
                const input = e.target.closest('[data-layout-key]');
                if (!input) return;
                values[input.dataset.layoutKey] = Number(input.value);
                const val = grid.querySelector(`[data-layout-val="${input.dataset.layoutKey}"]`);
                if (val) val.textContent = input.value;
                applyCaseLayout(values);
            });
            if (saveBtn) saveBtn.addEventListener('click', () => {
                safeStorageSet(CASE_LAYOUT_KEY, JSON.stringify(values));
                saveCaseFrameLayout(readCaseFrameLayout());
                applyCaseLayout(values);
            });
            if (resetBtn) resetBtn.addEventListener('click', () => {
                safeStorageRemove(CASE_LAYOUT_KEY);
                safeStorageRemove(CASE_FRAME_KEY);
                values = Object.assign(getCaseLayoutDefaults(), getBakedSetting('caseLayout', {}));
                caseLayoutItems.forEach(item => {
                    const input = grid.querySelector(`[data-layout-key="${item.key}"]`);
                    const val = grid.querySelector(`[data-layout-val="${item.key}"]`);
                    if (input) input.value = values[item.key];
                    if (val) val.textContent = values[item.key];
                });
                applyCaseLayout(values);
                applyCaseFrameLayout(getBakedSetting('caseFrames', {}));
            });
            window.addEventListener('keydown', e => {
                if (e.key.toLowerCase() === 'l' && !['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement.tagName)) {
                    toggleCaseLayoutPanel();
                }
            });
        }

        function initArchiveSwipe() {

            });

        function switchZone(z) {

        function navCase(dir) {
            const active = document.querySelector('.folder.active');
            if (!active || filtered.length < 2) return;
            if (dir > 0) active.classList.add('exit');
            setTimeout(() => {
                currIdx = (currIdx + dir + filtered.length) % filtered.length;
                renderArchive();
            }, 300);

        function barDiffuseGradient(chart, activeColor, softColor) {
            const area = chart.chartArea;
            if (!area) return activeColor;
            const horizontal = chart.options.indexAxis === 'y';
            const g = horizontal
                ? chart.ctx.createLinearGradient(area.left, 0, area.right, 0)
                : chart.ctx.createLinearGradient(0, area.bottom, 0, area.top);
            g.addColorStop(0, softColor);
            g.addColorStop(0.54, activeColor);
            g.addColorStop(1, chartPalette.orange);
            return g;
        }

        function isBarChart(chart) {
            return chart.config.type === 'bar';
        }

        function chartColors(chart, index, activeColor, flashing = false) {
            const ds = chart.data.datasets[0];
            return ds.data.map((_, i) => {
                if (isBarChart(chart)) {
                    return i === index
                        ? barDiffuseGradient(chart, flashing ? chartPalette.flash : activeColor, '#FFB090')
                        : barDiffuseGradient(chart, '#F4C9BA', '#FCE9E2');
                }
                return i === index
                    ? (flashing ? chartPalette.flash : activeColor)
                    : 'rgba(240, 162, 139, 0.62)';
            });
        }

        // 精准红色局部高亮
        function flashData(chart, datasetIdx, index, activeColor) {
            if (!chart || !chart.data || !chart.data.datasets) return;
            const oldTimer = chartFlashTimers.get(chart);
            if (oldTimer) clearInterval(oldTimer);

            let count = 0;
            const timer = setInterval(() => {
                const flashing = count % 2 === 0;
                chart.data.datasets[datasetIdx].backgroundColor = chartColors(chart, index, activeColor, flashing);
                chart.update('none');
                count++;
                if (count >= 6) {
                    clearInterval(timer);
                    chartFlashTimers.delete(chart);
                    chart.data.datasets[datasetIdx].backgroundColor = chartColors(chart, index, activeColor, false);
                    chart.update('none');
                }
            }, 150);
            chartFlashTimers.set(chart, timer);
        }

        function staticBarRows(items, activeLabel = '') {
            const max = Math.max.apply(null, [1].concat(items.map(item => item.value)));
            return items.map(item => `
                <div class="static-row${item.label === activeLabel ? ' active' : ''}">
                    <span class="static-label">${escapeHtml(item.label)}</span>
                    <span class="static-track"><span class="static-fill" style="--w:${Math.max(6, Math.round(item.value / max * 100))}%"></span></span>
                    <b>${item.value}</b>
                </div>
            `).join('');
        }

        function staticAxis(max) {
            const ticks = [0, .25, .5, .75, 1].map(v => Math.round(max * v));
            return `<div class="static-axis-title"><span>分类</span><span>人数 / 例</span></div>
                <div class="static-axis-ticks"><span></span>${ticks.map(v => `<span>${v}</span>`).join('')}<span></span></div>`;
        }

        function setChartCaseMeta(box, text) {
            const card = box && box.closest ? box.closest('.chart-card') : null;
            if (!card) return;
            card.dataset.caseSig = text || '';
            card.classList.remove('case-data-refresh');
            void card.offsetWidth;
            card.classList.add('case-data-refresh');
        }

        function renderStaticCharts(c) {
            if (!c) return;
            const jobBox = document.getElementById('jobChartHost');
            const outcomeBox = document.getElementById('outcomeChartHost');
            const scatterBox = document.getElementById('scatterChartHost');
            const scaleBox = document.getElementById('scaleChartHost');
            const jobItems = Object.keys(jobGroups).map(label => ({ label, value: jobGroups[label] }));
            const activeJob = getJobGroup(c.job);
            if (jobBox) {
                jobBox.innerHTML = `<div class="static-chart">${staticAxis(Math.max.apply(null, jobItems.map(i => i.value)))}${staticBarRows(jobItems, activeJob)}</div>`;
                setChartCaseMeta(jobBox, `当前职业：${activeJob}`);
            }
            const outcomeItems = [
                { key: 'death', label: '死亡', value: outcomeTotals[0] },
                { key: 'sequelae', label: '后遗症', value: outcomeTotals[1] },
                { key: 'recovered', label: '痊愈', value: outcomeTotals[2] }
            ];
            if (outcomeBox) {
                const total = outcomeItems.reduce((sum, item) => sum + item.value, 0);
                const deathEnd = outcomeItems[0].value / total * 100;
                const sequelaeEnd = (outcomeItems[0].value + outcomeItems[1].value) / total * 100;
                let donutOffset = 0;
                const donutSegments = outcomeItems.map((item, index) => {
                    const percent = item.value / total * 100;
                    const segment = `<circle class="donut-segment ${item.key === c.outcome ? 'active' : ''}" cx="21" cy="21" r="15.5" pathLength="100" stroke="${['#F31920','#FFB6A2','#FFD8CB'][index]}" stroke-dasharray="${percent} ${100 - percent}" stroke-dashoffset="${-donutOffset}"></circle>`;
                    donutOffset += percent;
                    return segment;
                }).join('');
                outcomeBox.innerHTML = `<div class="static-donut-wrap">
                    <div class="static-donut-shell"><svg class="static-donut-svg" viewBox="0 0 42 42" aria-label="结局生存关联分析">${donutSegments}</svg><span class="static-donut-total">${total}例</span></div>
                    <div class="donut-legend">
                        ${outcomeItems.map((item, index) => `<span class="${item.key === c.outcome ? 'active' : ''}" style="--c:${['#F31920','#FFB6A2','#FFD8CB'][index]}">${item.label} ${item.value}</span>`).join('')}
                    </div>
                </div>`;
                setChartCaseMeta(outcomeBox, `当前结局：${outcomeCn[c.outcome]}`);
            }
            if (scatterBox) {
                const dots = rawData.map((item, index) => {
                    const estimated = !Number.isFinite(item.age) || !Number.isFinite(item.temp);
                    const age = Number.isFinite(item.age) ? item.age : 36 + index * 1.25;
                    const temp = Number.isFinite(item.temp) ? item.temp : 36.4 + (index % 5) * 0.18;
                    const x = Math.max(0, Math.min(100, (age - 24) / 48 * 100));
                    const y = Math.max(0, Math.min(100, (temp - 35) / 10 * 100));
                    return `<i class="scatter-dot${estimated ? ' estimated' : ''}${item.id === c.id ? ' active' : ''}" style="--x:${x}%;--y:${y}%" title="#${item.id} ${age}岁 / ${temp.toFixed(1)}℃"></i>`;
                }).join('');
                scatterBox.innerHTML = `<div class="static-chart static-scatter">
                    <div class="scatter-legend"><span><i class="case-real"></i>实测</span><span><i class="case-est"></i>估算</span><span><i class="case-now"></i>当前档案</span></div>
                    <div class="scatter-y-labels"><span>45</span><span>42.5</span><span>40</span><span>37.5</span><span>35</span></div>
                    <div class="scatter-grid"><span class="scatter-axis-name y">体温℃</span>${dots}<span class="scatter-axis-name x">年龄</span></div>
                    <div class="scatter-x-labels"><span>24</span><span>36</span><span>48</span><span>60</span><span>72</span></div>
                </div>`;
                setChartCaseMeta(scatterBox, `当前档案：${c.id}`);
            }
            const scaleItems = ['A', 'B', 'C', 'D'].map((label, index) => ({ label, value: categoryTotals[index] }));
            if (scaleBox) {
                scaleBox.innerHTML = `<div class="static-chart">${staticAxis(Math.max.apply(null, scaleItems.map(i => i.value)))}${staticBarRows(scaleItems, c.cat)}</div>`;
                setChartCaseMeta(scaleBox, `当前分区：${c.cat}`);
            }
            requestAnimationFrame(() => {
                document.querySelectorAll('.static-row.active .static-fill, .donut-segment.active, .donut-legend .active, .scatter-dot.active').forEach((el, index) => {
                    el.animate([
                        { opacity: 1, filter: 'brightness(1)' },
                        { opacity: .42, filter: 'brightness(1.55) saturate(1.5)' },
                        { opacity: 1, filter: 'brightness(1)' }
                    ], { duration: 760, iterations: 4, delay: index * 55, easing: 'ease-in-out' });
                });
            });
        }

        function syncCharts(c) {
            Object.keys(charts || {}).forEach(key => {
                const chart = charts[key];
                try { if (chart && chart.destroy) chart.destroy(); } catch (err) {}
            });
            charts = {};
            renderStaticCharts(c);
            document.getElementById('speechContent').innerText = `看着这份卷宗。${c.warn} 这次${c.feature}这种迹象，大伙一定引以为戒。`;
            updateMainLiPose(c.outcome === 'death' || c.feature.includes('高热') || c.feature.includes('延误') ? 'serious' : 'focus');
            return;
            if (!charts.job || !charts.outcome || !charts.scatter) {
                renderStaticCharts(c);
                document.getElementById('speechContent').innerText = `看着这份卷宗。${c.warn} 这次${c.feature}这种迹象，大伙一定引以为戒。`;
                updateMainLiPose(c.outcome === 'death' || c.feature.includes('高热') || c.feature.includes('延误') ? 'serious' : 'focus');
                return;
            }
            // 1. 职业 (红色点亮)
            let group = getJobGroup(c.job);
            const jobIdx = Object.keys(jobGroups).indexOf(group);
            flashData(charts.job, 0, jobIdx, chartPalette.death);

            // 2. 结局 (精准点亮)
            const outIdx = c.outcome === 'death' ? 0 : c.outcome === 'sequelae' ? 1 : 2;
            const colors = [chartPalette.death, chartPalette.orange, chartPalette.light];
            flashData(charts.outcome, 0, outIdx, colors[outIdx]);

            // 3. 散点 (0.5℃ 精细轴)
            const ds = charts.scatter.data.datasets[0];
            const ptIdx = ds.data.findIndex(d => d.id === c.id);
            ds.activeIndex = ptIdx;
            if (scatterFlashTimer) {
                clearInterval(scatterFlashTimer);
                scatterFlashTimer = null;
            }
            if (ptIdx !== -1) {
                let count = 0;
                const applyScatterHighlight = flashing => {
                    ds.activeFlash = flashing;
                    ds.backgroundColor = ds.data.map((d, i) => i === ptIdx ? 'rgba(255,255,255,0)' : (d.estimated ? 'rgba(143,147,151,0.38)' : 'rgba(201,24,18,0.46)'));
                    ds.borderColor = ds.data.map((d, i) => i === ptIdx ? '#A90F0A' : (d.estimated ? 'rgba(95,101,104,0.42)' : 'rgba(169,15,10,0.72)'));

                const escaped = text.replace(/[&<>"']/g, s => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[s]));
                return terms.reduce((html, term) => {
                    const safeTerm = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    return html.replace(new RegExp(safeTerm, 'g'), `<span class="explainable" data-term="${term}">${term}<button class="explain-btn" type="button">📖 解释</button></span>`);
                }, escaped);
            }

            function list(items, terms) {
                return `<ul class="manual-list">${items.map(item => `<li>${markExplain(item, terms)}</li>`).join('')}</ul>`;
            }

            function renderChapter(chapter) {
                const c = chapter.content;
                const terms = c.need_explain || [];
                let leftHtml = `<h3><span class="chapter-mark" aria-hidden="true"></span>第${repairManualData.notebook.chapters.indexOf(chapter) + 1}章：${chapter.label}</h3><p>${markExplain(c.summary, terms)}</p>`;
                let rightHtml = "";
                if (c.key_points) leftHtml += `<h4>风险阈值</h4>${list(c.key_points, terms)}`;
                if (c.formula) rightHtml += `<div class="manual-note-card"><strong>计算公式</strong><p>${markExplain(c.formula, terms)}</p><p>${markExplain(c.explanation, terms)}</p></div>`;
                if (c.stages) rightHtml += `<div class="manual-card-list">${c.stages.map(s => `<div class="manual-note-card"><strong>${markExplain(s.name, terms)}｜${s.temp}</strong><p>症状：${markExplain(s.symptoms, terms)}</p><p>处理：${markExplain(s.action, terms)}</p></div>`).join('')}</div>`;
                if (c.timeline) {
                    leftHtml += `<h4>抢救时间线</h4>${list(c.timeline, terms)}`;
                    rightHtml += `<div class="manual-note-card"><strong>关键事实</strong><p>${markExplain(c.key_fact, terms)}</p></div>`;
                }
                if (c.categories) rightHtml += `<div class="manual-card-list">${c.categories.map(cat => `<div class="manual-note-card"><strong>${cat.type}</strong><p>职业：${markExplain(cat.examples, terms)}</p><p>风险：${markExplain(cat.risk, terms)}</p><p>案例：${markExplain(cat.cases, terms)}</p></div>`).join('')}</div>`;
                if (c.steps) rightHtml += `<div class="manual-card-list">${c.steps.map(step => `<div class="manual-note-card"><strong>${step.step}. ${markExplain(step.action, terms)}｜${step.task}</strong><p>${markExplain(step.detail, terms)}</p></div>`).join('')}</div>`;
                if (c.diseases) {
                    leftHtml += `<h4>禁忌证清单</h4>${list(c.diseases, terms)}`;
                    rightHtml += `<div class="manual-note-card"><strong>案例警示</strong><p>${markExplain(c.case_reference, terms)}</p><p>${markExplain(c.recommendation, terms)}</p></div>`;
                }
                if (c.statistics) {
                    leftHtml += `<h4>数据速记</h4>${list(c.statistics, terms)}`;
                    rightHtml += `<div class="manual-note-card"><strong>老李划重点</strong><p>${markExplain(c.key_insight, terms)}</p></div>`;
                }
                if (!rightHtml) rightHtml = `<div class="manual-note-card"><strong>老李提示</strong><p>${markExplain(repairManualData.lao_li.chapter_phrases[chapter.id], terms)}</p></div>`;
                contentWrap.innerHTML = `<section class="manual-single-page">${leftHtml}${rightHtml}</section>`;
                contentWrap.scrollTop = 0;
            }

            function switchChapter(id) {
                if (turningPage || id === activeId) return;
                turningPage = true;
                activeId = id;
                const chapter = repairManualData.notebook.chapters.find(item => item.id === id);
                tabsWrap.querySelectorAll('.manual-tab').forEach(btn => btn.classList.toggle('active', btn.dataset.id === id));
                updatePageNo();
                say(repairManualData.lao_li.chapter_phrases[id], id === 'statistics' ? 'serious' : 'focus');
                manualPage.classList.add('page-turning');
                setTimeout(() => renderChapter(chapter), 430);
                setTimeout(() => {
                    manualPage.classList.remove('page-turning');
                    turningPage = false;
                }, 900);
            }

            function updatePageNo() {
                const current = repairManualData.notebook.chapters.findIndex(item => item.id === activeId) + 1;
                manualPageNo.textContent = `${current} / ${repairManualData.notebook.chapters.length}`;
            }

            function turnManualPage(dir) {
                const chapters = repairManualData.notebook.chapters;
                const current = chapters.findIndex(item => item.id === activeId);
                const next = (current + dir + chapters.length) % chapters.length;
                switchChapter(chapters[next].id);
            }

            tabsWrap.innerHTML = repairManualData.notebook.chapters.map((chapter, index) => (
                `<button class="manual-tab${chapter.id === activeId ? ' active' : ''}" type="button" data-id="${chapter.id}" title="${chapter.label}">
                    <span data-short="${index + 1}">${index + 1}</span>
                    <span class="manual-tab-tip"><strong>${chapter.label}</strong><em>${chapter.content.summary}</em></span>
                </button>`
            )).join('');

            tabsWrap.addEventListener('click', e => {
                const tab = e.target.closest('.manual-tab');
                if (tab) {
                    tabsWrap.querySelectorAll('.manual-tab').forEach(item => item.classList.remove('expanded'));
                    switchChapter(tab.dataset.id);
                }
            });

            manualPrev.addEventListener('click', () => turnManualPage(-1));
            manualNext.addEventListener('click', () => turnManualPage(1));
            manualPage.addEventListener('click', e => {
                if (e.target.closest('button, .manual-pager, .explain-btn, .manual-tabs, .laoli-pop')) return;
                const rect = manualPage.getBoundingClientRect();
                turnManualPage(e.clientY < rect.top + rect.height / 2 ? -1 : 1);
            });

            contentWrap.addEventListener('click', e => {
                const btn = e.target.closest('.explain-btn');
                if (!btn) return;
                const term = btn.parentElement.dataset.term;
                const explanation = repairManualData.lao_li.explanations[term] || "这个词老李还没贴便签，先按高温风险重点处理。";
                say(`${term}：${explanation}`, ['热射病', 'DIC', 'MODS'].includes(term) ? 'serious' : 'focus');
            });

            launcher.addEventListener('click', () => {
                const isOpen = panel.classList.toggle('open');
                panel.setAttribute('aria-hidden', String(!isOpen));
                if (isOpen && !openedOnce) {
                    openedOnce = true;
                    renderChapter(repairManualData.notebook.chapters[0]);
                    say(repairManualData.lao_li.default_phrase, 'smile');
                }
            });

            closeBtn.addEventListener('click', () => {
                panel.classList.remove('open');
                panel.setAttribute('aria-hidden', 'true');
                tabsWrap.querySelectorAll('.manual-tab').forEach(item => item.classList.remove('expanded'));
            });

            renderChapter(repairManualData.notebook.chapters[0]);
            updatePageNo();
            say(repairManualData.lao_li.default_phrase, 'smile');
            makeManualDraggable(panel, dragHandle);
        }

        const liPoseAssets = {
            stand: 'assets/heat/leader1.png',
            point: 'assets/heat/leader2.png'
        };

        function resolveLiPose(mood = 'smile') {
            return mood === 'focus' || mood === 'serious' ? 'point' : 'stand';
        }

        function getLiAvatar(mood) {
            const pose = resolveLiPose(mood);
            return `<img class="laoli-avatar-img pose-${pose}" src="${liPoseAssets[pose]}" alt="老李">`;
        }

        function updateMainLiPose(mood = 'smile') {
            const pose = resolveLiPose(mood);
            document.querySelectorAll('#mainLi, #footerLi').forEach(mainLi => {
                if (mainLi.dataset.pose === pose) return;
                mainLi.dataset.pose = pose;
                mainLi.src = liPoseAssets[pose];
                mainLi.classList.toggle('is-pointing', pose === 'point');
                mainLi.classList.remove('pose-switch');
                void mainLi.offsetWidth;
                mainLi.classList.add('pose-switch');
            });
        }

        function makeManualDraggable(panel, handle) {
            let startX = 0, startY = 0, baseX = 0, baseY = 0, dragging = false;
            handle.addEventListener('pointerdown', e => {
                if (e.target.closest('button')) return;
                dragging = true;
                startX = e.clientX;
                startY = e.clientY;
                const rect = panel.getBoundingClientRect();
                baseX = rect.left;
                baseY = rect.top;
                panel.style.right = 'auto';
                panel.style.bottom = 'auto';
                panel.style.left = `${baseX}px`;
                panel.style.top = `${baseY}px`;
                handle.setPointerCapture(e.pointerId);
            });
            handle.addEventListener('pointermove', e => {
                if (!dragging) return;
                const nextX = Math.max(8, Math.min(window.innerWidth - panel.offsetWidth - 8, baseX + e.clientX - startX));
                const nextY = Math.max(8, Math.min(window.innerHeight - panel.offsetHeight - 8, baseY + e.clientY - startY));
                panel.style.left = `${nextX}px`;
                panel.style.top = `${nextY}px`;
            });
            handle.addEventListener('pointerup', () => { dragging = false; });
            window.addEventListener('resize', () => {
                panel.style.left = '';
                panel.style.top = '';
                panel.style.right = '';
                panel.style.bottom = '';
            });
        }

        window.onload = () => {
            let params;
            try {
                params = new URLSearchParams(window.location.search);
            } catch (err) {
                params = { get: () => null };
            }
            if (params.get('manualOnly') === '1') document.body.classList.add('manual-only');
            init();
            initRepairManual();
            if (params.get('manual') === '1') {
                const manual = document.getElementById('repairManual');
                if (manual) {
                    manual.classList.add('open');
                    manual.setAttribute('aria-hidden', 'false');
                }
            }
        };
    </script>
</body>
</html>
