<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Pad Preview Check</title>
  <style>
    html,body{margin:0;min-height:100%;font-family:Arial,"Microsoft YaHei",sans-serif;background:#fff7f2;color:#2a2725}
    body{display:grid;place-items:center;padding:28px}
    .box{width:min(520px,92vw);padding:28px 24px;border:2px solid #e85f36;border-radius:18px;background:#fff;box-shadow:0 18px 36px rgba(60,30,20,.12)}
    h1{margin:0 0 12px;color:#d94a32;font-size:28px}
    p{margin:8px 0;font-size:18px;line-height:1.55}
    code{padding:2px 6px;border-radius:6px;background:#fff0e8;color:#c8422e}
  </style>
</head>
<body>
  <div class="box">
    <h1>预览服务正常</h1>
    <p>如果 Pad 能看到这一页，说明电脑和 Pad 已经连通。</p>
    <p>下一步打开同一地址下的 <code>/index.html</code>。</p>
  </div>
</body>
</html>
